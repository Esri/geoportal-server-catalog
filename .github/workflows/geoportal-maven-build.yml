# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Geoportal Build with Artifact

on:
  push:
    branches: [ "Gp_upgrade" ]
  pull_request:
    branches: [ "Gp_upgrade" ]
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
      tags:
        description: 'Test scenario tags'

env:
  PROJECT_LOCATION: geoportal

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Set up Maven 3.9.9
      uses: stCarolas/setup-maven@v5
      with:
        maven-version: 3.9.9

    - name: Verify Java and Maven
      shell: pwsh
      run: |
        java -version
        mvn -version

    - name: Build with Maven
      shell: pwsh
      run: mvn -B package --file "${{ env.PROJECT_LOCATION }}/pom.xml"

    - name: Extract ${{ env.PROJECT_LOCATION }}/target/geoportal.war
      shell: pwsh
      run: 7z x "${{ env.PROJECT_LOCATION }}/target/geoportal.war" -ogeoportal_war

    - name: Archive geoportal_war to geoportal.zip
      shell: pwsh
      run: 7z a -tzip geoportal.zip .\geoportal_war\*

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: geoportal-war
        path: .\geoportal_war\*
