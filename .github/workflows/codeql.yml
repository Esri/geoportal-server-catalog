# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
#
# ******** NOTE ********
# We have attempted to detect the languages in your repository. Please check
# the `language` matrix defined below to confirm you have the correct set of
# supported CodeQL languages.
#
name: "CodeQL Advanced"

on:
  push:
    branches:
      - "master"
      - "Gp_upgrade"
      - "[0-9]+.[0-9]+.[0-9]+*"
      - "[0-9]+.[0-9]+.[0-9]+.[0-9]+*"
      - "patch-*"
    paths-ignore:
      - geoportal/src/main/webapp/viewer/jimu.js
      - components/GeoportalSearch/WebAppBuilder
      - geoportal/src/main/webapp/api
      - .gitattributes
      - docker
      - "**.gitignore"
      - "**.md"
      - "**.txt"

  pull_request:
    branches:
      - "master"
      - "Gp_upgrade"
      - "[0-9]+.[0-9]+.[0-9]+*"
      - "[0-9]+.[0-9]+.[0-9]+.[0-9]+*"
      - "patch-*"
    paths-ignore:
      - geoportal/src/main/webapp/viewer/jimu.js
      - components/GeoportalSearch/WebAppBuilder
      - geoportal/src/main/webapp/api
      - .gitattributes
      - docker
      - "**.gitignore"
      - "**.md"
      - "**.txt"

  schedule:
    - cron: '23 5 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'csharp' && 'windows-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: java-kotlin
          build-mode: manual
        - language: javascript-typescript
          build-mode: none
        - language: python
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - if: matrix.language == 'java-kotlin'
      name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - if: matrix.language == 'java-kotlin'
      name: Set up Maven 3.9.9
      uses: stCarolas/setup-maven@v5
      with:
        maven-version: 3.9.9

    - if: matrix.language == 'java-kotlin'
      name: Verify Java and Maven
      shell: bash
      run: |
        java -version
        mvn -version

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        config-file: ./.github/codeql/codeql-config.yml

    - if: matrix.build-mode == 'manual' && matrix.language == 'java-kotlin'
      name: Build Java/Kotlin code
      shell: bash
      run: |
        cd geoportal
        echo "Building GeoPortal Server"
        mvn clean install -DskipTests
        echo "Building GeoPortal Server Catalog"
        cd ../geoportal-search
        mvn clean install -DskipTests

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{ matrix.language }}"
